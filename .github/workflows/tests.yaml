name: Tests

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install -r requirements.txt

      # 🔥 Étape clé : recréer la structure Home Assistant
      - name: Create HA-like structure
        run: |
          mkdir -p custom_components/idf_mobilite_assistant
          cp -r steps custom_components/idf_mobilite_assistant/
          cp -r utils custom_components/idf_mobilite_assistant/
          cp -r tests custom_components/idf_mobilite_assistant/
          cp const.py custom_components/idf_mobilite_assistant/
          cp config_flow.py custom_components/idf_mobilite_assistant/
          cp sensor.py custom_components/idf_mobilite_assistant/
          touch custom_components/idf_mobilite_assistant/__init__.py
          mv custom_components/idf_mobilite_assistant/__init__.py custom_components/idf_mobilite_assistant/__init__.py.disabled

      - name: Run tests
        run: pytest --maxfail=1 --disable-warnings --cov=.
