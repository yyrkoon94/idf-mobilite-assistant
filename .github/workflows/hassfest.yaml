name: Validate with hassfest

on:
  push:
  pull_request:

permissions: {}

jobs:
  hassfest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: home-assistant/actions/hassfest@master

      - name: Create HA-like structure
        run: |
          mkdir -p custom_components/idf_mobilite_assistant
          cp -r steps custom_components/idf_mobilite_assistant/
          cp -r utils custom_components/idf_mobilite_assistant/
          cp const.py custom_components/idf_mobilite_assistant/
          cp config_flow.py custom_components/idf_mobilite_assistant/
          cp sensor.py custom_components/idf_mobilite_assistant/
          cp __init__.py custom_components/idf_mobilite_assistant/
          cp manifest.json custom_components/idf_mobilite_assistant/